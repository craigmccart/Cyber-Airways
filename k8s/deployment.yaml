apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyber-airways-frontend
  labels:
    app: cyber-airways-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyber-airways-frontend
  template:
    metadata:
      labels:
        app: cyber-airways-frontend
    spec:
      containers:
        - name: frontend
          # Placeholder image. The workflow replaces this with the built image URL.
          image: AWS_ACCOUNT_ID.dkr.ecr.eu-west-2.amazonaws.com/cyber-airways-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
