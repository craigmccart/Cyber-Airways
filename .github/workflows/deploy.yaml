name: Deploy Cyber Airways to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: cyber-airways-app
  EKS_CLUSTER_NAME: cyber-airways-cluster

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.build-image.outputs.image_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Verify ECR login success
      run: |
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        echo "Checking ECR login status..."
        echo "Registry output: $ECR_REGISTRY"
        if [ -z "$ECR_REGISTRY" ]; then
          echo "ERROR: ECR login failed - no registry output" >&2
          exit 1
        fi
        echo "ECR login successful"

    - name: Check Dockerfile exists
      run: |
        if [ ! -f "Dockerfile" ]; then
          echo "ERROR: Dockerfile not found in repository root" >&2
          ls -la
          exit 1
        fi
        echo "Dockerfile found"

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "Full image URL: $FULL_IMAGE"

        echo "Starting Docker build..."
        if docker build -t "$FULL_IMAGE" .; then
          echo "Docker build successful"
        else
          echo "image_url=BUILD_FAILED" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo "Starting Docker push..."
        if docker push "$FULL_IMAGE"; then
          echo "Docker push successful"
        else
          echo "image_url=PUSH_FAILED" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo "image_url=$FULL_IMAGE" >> $GITHUB_OUTPUT

        # Debug: Show the output file contents
        echo "GITHUB_OUTPUT file contents:"
        cat $GITHUB_OUTPUT

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    env:
      IMAGE_URL: ${{ needs.build-and-push.outputs.image_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Configure kubectl
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Debug job outputs
      run: |
        echo "Build job result: ${{ needs.build-and-push.result }}"
        echo "needs.build-and-push.outputs.image_url: ${{ needs.build-and-push.outputs.image_url }}"
        echo "IMAGE_URL from env: $IMAGE_URL"
        echo "All build job outputs: ${{ toJson(needs.build-and-push.outputs) }}"

    - name: Deploy to EKS
      run: |
        echo "IMAGE_URL=$IMAGE_URL"
        if [ -z "$IMAGE_URL" ] || [ "$IMAGE_URL" = "BUILD_FAILED" ] || [ "$IMAGE_URL" = "PUSH_FAILED" ]; then
          echo "ERROR: Build job failed or IMAGE_URL is empty" >&2
          exit 1
        fi

        # Replace the image placeholder in the deployment manifest
        sed -i "s|AWS_ACCOUNT_ID.dkr.ecr.eu-west-2.amazonaws.com/cyber-airways-app:latest|$IMAGE_URL|" k8s/deployment.yaml

        # Apply manifests
        kubectl apply -f k8s/.

        # Update the running deployment image explicitly
        kubectl set image deployment/cyber-airways-frontend frontend="$IMAGE_URL" --record
