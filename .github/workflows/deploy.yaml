name: Deploy Cyber Airways to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: cyber-airways-app
  EKS_CLUSTER_NAME: cyber-airways-cluster

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Verify ECR login success
      run: |
        ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        echo "Checking ECR login status..."
        echo "Registry output: $ECR_REGISTRY"
        if [ -z "$ECR_REGISTRY" ]; then
          echo "ERROR: ECR login failed - no registry output" >&2
          echo "This could be due to:" >&2
          echo "1. Invalid AWS credentials" >&2
          echo "2. ECR repository doesn't exist" >&2
          echo "3. Insufficient permissions" >&2
          exit 1
        fi
        echo "ECR login successful"

    - name: Check Dockerfile exists
      run: |
        if [ ! -f "Dockerfile" ]; then
          echo "ERROR: Dockerfile not found in repository root" >&2
          ls -la
          exit 1
        fi
        echo "Dockerfile found"

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Building Docker image with ECR_REGISTRY: $ECR_REGISTRY"
        echo "IMAGE_TAG: $IMAGE_TAG"
        echo "ECR_REPOSITORY: $ECR_REPOSITORY"
        
        if [ -z "$ECR_REGISTRY" ]; then
          echo "ERROR: ECR_REGISTRY is empty" >&2
          exit 1
        fi
        
        if [ -z "$ECR_REPOSITORY" ]; then
          echo "ERROR: ECR_REPOSITORY is empty" >&2
          exit 1
        fi
        
        FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "Full image URL: $FULL_IMAGE"
        
        echo "Starting Docker build..."
        if docker build -t "$FULL_IMAGE" .; then
          echo "Docker build successful"
        else
          echo "ERROR: Docker build failed" >&2
          exit 1
        fi
        
        echo "Starting Docker push..."
        if docker push "$FULL_IMAGE"; then
          echo "Docker push successful"
        else
          echo "ERROR: Docker push failed" >&2
          exit 1
        fi
        
        echo "Setting job output..."
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
        echo "Successfully set output: image=$FULL_IMAGE"
        
        # Verify output was set
        echo "GITHUB_OUTPUT contents:"
        cat $GITHUB_OUTPUT

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    # CORRECTED: The env block is now at the job level
    env:
      IMAGE_URL: ${{ needs.build-and-push.outputs.image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Configure kubectl
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Debug job outputs
      run: |
        echo "Debugging job outputs:"
        echo "needs.build-and-push.outputs.image: ${{ needs.build-and-push.outputs.image }}"
        echo "IMAGE_URL from env: $IMAGE_URL"
        
    - name: Deploy to EKS
      run: |
        echo "IMAGE_URL=$IMAGE_URL"
        if [ -z "$IMAGE_URL" ]; then
          echo "ERROR: IMAGE_URL is empty. Failing early." >&2
          echo "Available outputs from build job:"
          echo "${{ toJson(needs.build-and-push.outputs) }}"
          exit 1
        fi
        # Replace the placeholder in the deployment file
        sed -i "s|AWS_ACCOUNT_ID.dkr.ecr.eu-west-2.amazonaws.com/cyber-airways-app:latest|$IMAGE_URL|" k8s/deployment.yaml
        
        # Apply manifests as-is
        kubectl apply -f k8s/.
        
        # Update the running deployment image explicitly
        kubectl set image deployment/cyber-airways-frontend frontend="$IMAGE_URL" --record
